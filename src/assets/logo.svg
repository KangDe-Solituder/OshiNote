<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="pen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BE185D"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect x="32" y="32" width="448" height="448" rx="128" ry="128" fill="url(#bg)"/>

  <!-- paper / note card -->
  <g transform="translate(140, 100)">
    <rect x="0" y="20" width="230" height="280" rx="24" ry="24" fill="white" opacity="0.95"/>
    <!-- paper lines -->
    <line x1="30" y1="80" x2="200" y2="80" stroke="#F9A8D4" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="110" x2="180" y2="110" stroke="#F9A8D4" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="140" x2="190" y2="140" stroke="#F9A8D4" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="170" x2="160" y2="170" stroke="#F9A8D4" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- heart shape -->
  <g transform="translate(256, 310)">
    <path d="M0,-80 C-20,-110 -80,-90 -80,-50 C-80,-10 -40,20 0,50 C40,20 80,-10 80,-50 C80,-90 20,-110 0,-80 Z"
          fill="white" opacity="0.95"/>
  </g>

  <!-- pen / quill on the right side -->
  <g transform="translate(320, 130) rotate(15)">
    <!-- pen body -->
    <rect x="-6" y="0" width="12" height="160" rx="6" fill="url(#pen)"/>
    <!-- pen tip -->
    <polygon points="-8,160 8,160 0,200" fill="#831843"/>
    <!-- pen clip -->
    <rect x="2" y="20" width="4" height="40" rx="2" fill="#F472B6" opacity="0.6"/>
  </g>

  <!-- small sparkles -->
  <g opacity="0.8">
    <circle cx="380" cy="100" r="6" fill="white"/>
    <circle cx="420" cy="140" r="4" fill="white"/>
    <circle cx="390" cy="200" r="5" fill="white"/>
    <circle cx="100" cy="360" r="5" fill="white"/>
    <circle cx="130" cy="400" r="3" fill="white"/>
  </g>
</svg>
